<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Marmitex.dev - Pedido Online</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Arial, sans-serif;
}

body {
  background: #f2f4f8;
}

header {
  background: #d90429;
  color: white;
  padding: 18px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  position: sticky;
  top: 0;
  z-index: 100;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 25px;
}

.categoria { margin-bottom: 20px; }

.categoria h3 {
  padding: 12px;
  cursor: pointer;
  background: white;
  border-left: 6px solid #d90429;
  border-radius: 8px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.05);
}

.produto {
  background: white;
  border-radius: 14px;
  padding: 16px;
  margin-top: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.06);
  transition: 0.2s;
}

.produto:hover {
  transform: translateY(-3px);
}

.nome-preco {
  display: flex;
  justify-content: space-between;
  font-weight: bold;
}

.descricao {
  font-size: 13px;
  color: #666;
  margin: 8px 0;
}

.controle {
  display: flex;
  align-items: center;
  gap: 10px;
}

.controle button {
  background: #d90429;
  color: white;
  border: none;
  border-radius: 50%;
  width: 35px;
  height: 35px;
  font-size: 16px;
  cursor: pointer;
}

.checkout {
  background: white;
  padding: 20px;
  border-radius: 14px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
  position: sticky;
  top: 100px;
  height: fit-content;
}

.total {
  font-weight: bold;
  margin-bottom: 15px;
  text-align: right;
  font-size: 18px;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

textarea {
  resize: none;
  height: 80px;
}

button.enviar {
  width: 100%;
  padding: 14px;
  background: #2ecc71;
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  font-size: 16px;
}

button.enviar:hover {
  background: #27ae60;
}

@media (max-width: 768px) {
  .container { grid-template-columns: 1fr; }
  .checkout { position: static; }
}
/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  visibility: hidden;
  opacity: 0;
  transition: 0.3s;
}

.modal.active {
  visibility: visible;
  opacity: 1;
}

.modal-content {
  background: white;
  padding: 30px;
  border-radius: 14px;
  text-align: center;
  width: 90%;
  max-width: 400px;
}

.modal-content h3 {
  margin: 10px 0;
}

.modal-content p {
  font-size: 14px;
  color: #555;
  margin-bottom: 15px;
}

.modal-content button {
  padding: 10px 20px;
  background: #2ecc71;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
  font-weight: bold;
}

.modal-icon {
  font-size: 40px;
}
.resumo-carrinho {
  background: white;
  padding: 15px;
  border-radius: 14px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
  position: sticky;
  top: 100px;
  height: fit-content;
}

.resumo-carrinho h3 {
  margin-bottom: 10px;
}

#listaCarrinho {
  max-height: 200px;
  overflow-y: auto;
  font-size: 14px;
  margin-bottom: 10px;
}

.resumo-total {
  display: flex;
  justify-content: space-between;
  font-weight: bold;
}

/* MOBILE */
@media (max-width: 768px) {

  .container {
    grid-template-columns: 1fr;
  }

  .checkout {
    display: none; /* Esconde formulário inicialmente */
  }

  .resumo-carrinho {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    border-radius: 0;
    padding: 12px 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 999;
  }

  .resumo-carrinho h3,
  #listaCarrinho {
    display: none; /* Esconde lista detalhada no mobile */
  }

  .resumo-total {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .resumo-total button {
    background: #2ecc71;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    color: white;
    font-weight: bold;
  }

}

</style>
</head>

<body>

<header>🍱 Marmitex.dev - Pedido Online</header>

<div class="container">
  <div id="conteudo"></div>
  <div class="resumo-carrinho">
  <div class="resumo-total">
    <span>
      🛒 <strong id="totalItens">0</strong> itens
      | R$ <strong id="valorTotalResumo">0.00</strong>
    </span>
    <button onclick="mostrarCheckout()">Finalizar</button>
  </div>
</div>


  <div class="checkout">
  <div class="total">Total: R$ <span id="valorTotal">0.00</span></div>

  <input type="text" id="nome" placeholder="Seu nome" autocomplete="off">
  <input type="tel" id="telefone" placeholder="Seu telefone" autocomplete="off">

  <select id="tipo_entrega" autocomplete="off">
    <option value="">Tipo de pedido</option>
    <option value="entrega">Entrega</option>
    <option value="retirada">Retirada</option>
  </select>

  <input type="text" id="endereco" placeholder="Endereço (obrigatório para entrega)" autocomplete="off">

  <select id="forma_pagamento" autocomplete="off">
    <option value="">Forma de pagamento</option>
    <option value="pix">PIX</option>
    <option value="dinheiro">Dinheiro</option>
    <option value="cartao">Cartão</option>
  </select>

  <!-- ESTAVA FALTANDO -->
  <textarea id="observacao" placeholder="Observações (opcional)" autocomplete="off"></textarea>

  <!-- ESTAVA FALTANDO -->
  <button class="enviar" onclick="finalizarPedido()">Enviar Pedido</button>
</div>


<script>

// ================= CARDÁPIO COMPLETO =================

const cardapio = {

"🍽️ Todos os dias": [
["Bife",23,"Arroz, feijão e batata frita"],
["Bisteca",23,"Arroz, feijão e batata frita"],
["Calabresa",23,"Arroz, feijão e batata frita"],
["Filé de frango",23,"Arroz, feijão e batata frita"],
["Frango cozido",23,"Arroz, feijão e batata frita"],
["Picadinho",23,"Arroz, feijão e batata frita"],
["Steak",23,"Arroz, feijão e batata frita"]
],

"📅 Pratos do Dia": [
["Segunda - Virada à Paulista",26,"Arroz, tutu, couve, torresmo, ovo e bisteca"],
["Terça - Costela Cozida",26,"Arroz, feijão e farofa"],
["Quarta - Strogonoff de Frango",26,"Arroz e batata frita"],
["Quinta - Macarrão com Frango Assado",26,"Macarrão penne e frango"],
["Sexta - Filé de Peixe",26,"Arroz, feijão e purê"]
],

"⭐ Especiais": [
["Bife com ovo",26,"Arroz, feijão e batata frita"],
["Bife com queijo",26,"Arroz, feijão e batata frita"],
["Bife à milanesa",26,"Arroz, feijão e batata frita"],
["Bife à parmegiana",26,"Arroz, feijão e batata frita"],
["Calabresa com ovo",26,"Arroz, feijão e batata frita"],
["Calabresa com queijo",26,"Arroz, feijão e batata frita"],
["Filé de frango à milanesa",26,"Arroz, feijão e batata frita"],
["Filé à parmegiana",26,"Arroz, feijão e batata frita"],
["Hambúrguer com ovo",26,"Arroz, feijão e batata frita"],
["Panqueca de carne",26,"Arroz, feijão e batata frita"],
["Panqueca de frango",26,"Arroz, feijão e batata frita"]
],

"🥘 Feijoada Light (Quarta)": [
["Prato Feito Feijoada Light",30,"Feijoada light completa"],
["Feijoada Light Pequena",45,"Serve 1 pessoa"],
["Feijoada Light Grande",60,"Serve 2 pessoas"]
],

"🌱 Vegetarianos": [
["Carne de soja",26,"Arroz, feijão e batata frita"],
["Hambúrguer de soja",26,"Arroz, feijão e batata frita"],
["Legumes com fritas",26,"Arroz, feijão, legumes e batata frita"],
["Omelete",26,"Arroz, feijão e batata frita"],
["Ovos com fritas",26,"Arroz, feijão e batata frita"],
["Panqueca de queijo",26,"Arroz, feijão e batata frita"]
],

"🍟 Batata Frita": [
["Fritas pequena",15,"Porção individual"],
["Fritas grande",20,"Porção grande"],
["Fritas cheddar e bacon",30,"Com cheddar e bacon"]
],

"🥗 Prato Light": [
["Light de bife",29,"Arroz integral, salada e legumes"],
["Light de filé de frango",29,"Arroz integral, salada e legumes"]
],

"🥗 Saladas": [
["Salada primavera",6,"Salada fresca"]
],

"🍔 Lanches ": [
["X Bacon",24,"Hambúrguer, queijo, bacon, alface, maionese e fritas"],
["X Calabresa",21,"Calabresa, queijo, alface e fritas"],
["X Egg",24,"Hambúrguer, ovo, queijo e fritas"],
["X Filé de Frango",21,"Filé de frango, queijo e fritas"],
["X Salada",21,"Hambúrguer, queijo e fritas"],
["X Tudo",30,"Hambúrguer completo e fritas"]
],

"🥤 Bebidas": [
["Refrigerante lata",6,"Lata 350ml"],
["Refrigerante 600ml",10,"Garrafa 600ml"],
["Refrigerante 2L",15,"Garrafa 2 litros"],
["Tubaína 2L",10,"Garrafa 2 litros"],
["Água 500ml",5,"Sem gás"],
["Água com gás 500ml",5,"Com gás"]
]

};

// ================= SISTEMA =================

let carrinho = {};
const container = document.getElementById("conteudo");

for (let categoria in cardapio) {

  const divCategoria = document.createElement("div");
  divCategoria.className = "categoria";

  const titulo = document.createElement("h3");
  titulo.innerText = "▶ " + categoria;

  const conteudoCategoria = document.createElement("div");
  conteudoCategoria.style.display = "none";

  titulo.onclick = () => {
    const aberto = conteudoCategoria.style.display === "block";
    conteudoCategoria.style.display = aberto ? "none" : "block";
    titulo.innerText = (aberto ? "▶ " : "▼ ") + categoria;
  };

  divCategoria.appendChild(titulo);
  divCategoria.appendChild(conteudoCategoria);

  cardapio[categoria].forEach(item => {

    const nome = item[0];
    const preco = item[1];
    const descricao = item[2];

    carrinho[nome] = { quantidade: 0, preco: preco };

    const divProduto = document.createElement("div");
    divProduto.className = "produto";

    divProduto.innerHTML = `
      <div class="nome-preco">
        <span>${nome}</span>
        <span>R$ ${preco}</span>
      </div>
      <div class="descricao">${descricao}</div>
      <div class="controle">
        <button onclick="alterar('${nome}', -1)">-</button>
        <span id="qtd-${nome}">0</span>
        <button onclick="alterar('${nome}', 1)">+</button>
      </div>
    `;

    conteudoCategoria.appendChild(divProduto);
  });

  container.appendChild(divCategoria);
}

function alterar(nome, valor) {
  carrinho[nome].quantidade += valor;
  if (carrinho[nome].quantidade < 0) carrinho[nome].quantidade = 0;
  document.getElementById(`qtd-${nome}`).innerText = carrinho[nome].quantidade;
  atualizarTotal();
}

function atualizarTotal() {
  let total = 0;
  let totalItens = 0;
  let listaHTML = "";

  for (let item in carrinho) {
    if (carrinho[item].quantidade > 0) {
      total += carrinho[item].quantidade * carrinho[item].preco;
      totalItens += carrinho[item].quantidade;

      listaHTML += `
        <div>
          ${carrinho[item].quantidade}x ${item}
        </div>
      `;
    }
  }

  // Atualiza total original do checkout
  document.getElementById("valorTotal").innerText = total.toFixed(2);

  // Atualiza resumo do carrinho
  document.getElementById("valorTotalResumo").innerText = total.toFixed(2);
  document.getElementById("totalItens").innerText = totalItens;
  document.getElementById("listaCarrinho").innerHTML = listaHTML || "Carrinho vazio";
}


function limparFormulario() {
  document.querySelectorAll("input, textarea, select").forEach(el => el.value = "");
}

function resetarCarrinho() {
  for (let item in carrinho) {
    carrinho[item].quantidade = 0;
    const span = document.getElementById(`qtd-${item}`);
    if (span) span.innerText = 0;
  }
  atualizarTotal();
}

async function finalizarPedido() {

  const nome = document.getElementById("nome").value.trim();
  const telefone = document.getElementById("telefone").value.trim();
  const tipo_entrega = document.getElementById("tipo_entrega").value;
  const endereco = document.getElementById("endereco").value.trim();
  const forma_pagamento = document.getElementById("forma_pagamento").value;
  const observacao = document.getElementById("observacao").value.trim();

  if (!nome || !telefone || !tipo_entrega || !forma_pagamento) {
    alert("Preencha todos os campos obrigatórios!");
    return;
  }

  if (tipo_entrega === "entrega" && !endereco) {
    alert("Informe o endereço para entrega!");
    return;
  }

  let itens = [];

  for (let item in carrinho) {
    if (carrinho[item].quantidade > 0) {
      itens.push({
        nome: item,
        quantidade: carrinho[item].quantidade,
        preco: carrinho[item].preco
      });
    }
  }

  if (itens.length === 0) {
    alert("Selecione pelo menos um item!");
    return;
  }

  const resposta = await fetch("/pedido", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      nome,
      telefone,
      tipo_entrega,
      endereco,
      forma_pagamento,
      observacao,
      itens
    })
  });

  if (resposta.ok) {
    abrirModal();
    limparFormulario();
    resetarCarrinho();
  } else {
    alert("Erro ao enviar pedido.");
  }
}
function abrirModal() {
  document.getElementById("modalSucesso").classList.add("active");
}

function fecharModal() {
  document.getElementById("modalSucesso").classList.remove("active");
}
function mostrarCheckout() {
  const checkout = document.querySelector(".checkout");
  checkout.style.display = "block";

  window.scrollTo({
    top: checkout.offsetTop,
    behavior: "smooth"
  });
}

</script>
<!-- MODAL -->
<div id="modalSucesso" class="modal">
  <div class="modal-content">
    <div class="modal-icon">✅</div>
    <h3>Pedido Enviado!</h3>
    <p>Seu pedido foi enviado com sucesso.</p>
    <button onclick="fecharModal()">Fechar</button>
  </div>
</div>

</body>
</html>
